<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>မြန်မာ့ရိုးရာ အသက်အလိုက် ဟောစတမ်း</title>
    <style>
        :root { --primary-color: #d4af37; --bg-color: #f8f5f0; }
        body { font-family: 'Pyidaungsu', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 15px; line-height: 1.6; }
        .container { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); max-width: 500px; width: 100%; border-top: 8px solid var(--primary-color); }
        h2 { text-align: center; color: #5a4a1a; margin-bottom: 20px; font-size: 24px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #444; }
        select, input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 8px; box-sizing: border-box; font-size: 16px; outline: none; transition: 0.3s; }
        select:focus, input:focus { border-color: var(--primary-color); }
        button { width: 100%; padding: 15px; background-color: var(--primary-color); color: white; border: none; border-radius: 8px; font-size: 18px; cursor: pointer; transition: 0.3s; margin-top: 15px; font-weight: bold; }
        button:hover { background-color: #b8962d; }
        #result { margin-top: 25px; padding: 20px; border-radius: 12px; display: none; border: 1px solid #e0e0e0; background: #fffdf5; }
        .result-header { font-size: 20px; font-weight: bold; text-align: center; margin-bottom: 15px; color: #222; }
        .status-text { color: #d32f2f; font-size: 24px; font-weight: bold; }
        .desc { text-align: justify; color: #333; font-size: 17px; line-height: 1.8; }
        .footer { text-align: center; font-size: 12px; color: #999; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>ဗေဒင်ဟောစတမ်း</h2>
    
    <div class="form-group">
        <label>မွေးနေ့</label>
        <select id="birthDay">
            <option value="sun">တနင်္ဂနွေ</option>
            <option value="mon">တနင်္လာ</option>
            <option value="tue">အင်္ဂါ</option>
            <option value="wed">ဗုဒ္ဓဟူး</option>
            <option value="thu">ကြာသပတေး</option>
            <option value="fri">သောကြာ</option>
            <option value="sat">စနေ</option>
        </select>
    </div>

    <div class="form-group">
        <label>ရောက်ဆဲအသက်</label>
        <input type="number" id="age" placeholder="ဥပမာ - ၂၀" min="1">
    </div>

    <button onclick="calculate()">ဟောစတမ်းကြည့်မည်</button>

    <div id="result">
        <div class="result-header">ရောက်ရှိနေသောကိန်း - <span id="statusName" class="status-text"></span></div>
        <hr>
        <div id="fortuneText" class="desc"></div>
    </div>
    <div class="footer">KSY-BLOG Project</div>
</div>

<script>
    const fortunes = {
        "တည်": "တည်ဆိုတာသင်္ဘောတည်ဆောက်တာကိုပြောတာပါ။ လုပ်ငန်းတွေအတွက်ကြံစည်ဆဲ၊ လုပ်ငန်းတွေအစပြုဆဲအခြေအနေကိုရောက်နေတယ်လို့ ပြောတာပါ။ လုပ်ငန်းအတွက်ရင်းနှီးမြုပ်နှံဖို့ ရန်ရှာရာတွင်လွယ်ကူလိမ့်မည်။ လုပ်ငန်းအကြံအစည်အောင်မြင်မည်။ အလုပ်ရှာနေလျှင် အလုပ်ရမည်။ အလုပ်လျှောက်ထားလျှင်အလုပ်ရမည်။ အမှုကိစ္စတွေ၊ အလုပ်တွေများမည်။ ငွေဝင်များသလို ငွေထွက်လဲများမည်။",
        "ထွက်": "ထွက်ဆိုတာဇမ္ဗနဂိုရ်ပြည်ကသင်္ဘောစထွက်တာကိုပြောတာပါ။ ကောင်းမွန်သောမိတ်ဆွေသစ်များ တိုးမည်။ စပ်တူရှယ်ယာလုပ်ငန်းများလုပ်ရမည့်အချိန်ကောင်းပါ။ပြည်တွင်း၊ပြည်ပခရီးများသွားရမည်။ နိုင်ငံခြားကုန်လုပ်ငန်းများ အောင်မြင်မည်။",
        "ပျက်": "ပျက်ဆိုတာ သင်္ဘောပျက်သွားတာကိုပြောတာပါ။ ကံဇာတာညံ့ချိန်ပါ။ စီးပွားရေးကျဆင်းမယ်။ သူများမကောင်းကြံတာခံရတတ်သည်။ မတော်တဆထိခိုက်မှုအသေးအဖွဲများကြုံတတ်သလို သေကောင်ပေါင်းလဲဝေဒနာများ ဖြစ်တတ်သည်။ ရာထူးလုပ်ငန်းကိုနှောင့်ယှက်မည့်သူ ပေါ်လာလိမ့်မည်။ အိမ်ထောင်ရေးကို အထူးသတိထားပါ။",
        "ကျောက်": "ကျောက်ဆိုတာမေခလာနတ်သမီးက ကျောက်ဖျာထက်မှာတင်ပေးထားတဲ့ ကိန်းဆိုက်ပြီဆိုတော့ ကံကောင်းပြီလို့မှတ်ပါ။ မမျှော်လင့်ပဲကူညီမယ့်သူတွေပေါ်မယ်။ အောင်ပါလေသိန်းထီဆုကြီးများ ပေါက်မည်။ မကျန်းမမာဖြစ်နေရင်တော့ ပြန်ပြီးကျန်းမာလာမည်။ ဆရာကောင်းနဲ့တွေ့ပြီလို့ဟောပါ။ အမှုရှိရင်ရှိနိုင်မည်။ အချုပ်နှောင်ခံနေရရင်လွတ်မည်။ ကျဆင်းနေသောစီးပွားရေးများ ပြန်တက်လာမည်။ ပညာရေးလဲကောင်းမည်။ အိမ်ထောင်ကျလျှင် အိမ်ထောင်ဖက်ကောင်းနှင့်တွေ့ပြီလို့ဟောပါ။ အကြံအစည်များ အောင်မြင်မည်။",
        "ထီး": "ထီးဆိုတာ ထီးဖြူဆောင်းတဲ့ကိန်းပါ။ နာမည်ကျော်ကြားထင်ရှားမည်။ ကောင်းသတင်းနှင့် ကျော်ကြားခြင်းပါ။ ဆုလာဘ်တွေရမည်။ ဘွဲ့ထူးဂုဏ်ထူးများရမည်။ စာမေးပွဲဖြေထားရင် စာမေးပွဲအောင်မည်။ ရာထူးတိုးမည်။ စီးပွားရေးလုပ်ငန်းများ တိုးချဲ့ရမည်။ အိမ်သစ်ဆောက်ကိန်း၊ အိမ်သစ်ရကိန်းပေါ်မည်။",
        "နန်း": "နန်းဆိုတာ နန်းအပ်ခံရတဲ့ကိန်းပါ။ ကံဇာတာကောင်းပြီလို့ဟောပါ။ ရာထူးတိုးမည်။ စီးပွားဖြစ်ထွန်းမည်။ အမွေအနှစ်တွေရမည်။ အပြိုင်အဆိုင်တွေမှာ အနိုင်ရမည်။ ရွေးကောက်ပွဲတွေမှာဝင်ရောက်ယှဉ်ပြိုင်ရင်နိုင်မည်။ အိမ်ထောင်ကျကိန်းရှိသည်။ အိမ်ထောင်ကျလျှင်လဲ ကံကောင်းမည်။ အလှူပြုလုပ်ရမည်။ မင်းစိုးရာဇာအကြီးအကဲဖြစ်မည်။",
        "စံ": "စံဆိုတာ မင်းစည်းစိမ်ကိုခံယူရတဲ့ကိန်းပါ။ ဘေးအန္တာရာယ်ကင်းပြီး စုတ်ကြီး၊လာဘ်ကြီးတွေဝင်မည်။ လုပ်ငန်းတွေတိုးတက်မည်။ ကြီးမားတဲ့ရာထူးတွေရမည်။ သိုလှောင်ပစ္စည်းတွေကအကျိုးအမြတ်ရမည်။ အခြွေအရံမိတ်ဆွေအပေါင်း အသင်းတိုးမည်။ ငွေကြေးစုဆောင်းမိမည်။"
    };

    const sequence = ["တည်", "ထွက်", "ပျက်", "ကျောက်", "ထီး", "နန်း", "စံ"];

    function calculate() {
        const day = document.getElementById('birthDay').value;
        const age = parseInt(document.getElementById('age').value);

        if (!age) return;

        // နေ့အလိုက် စမှတ် (ဇယားထဲက ပထမဆုံးအကွက်ရဲ့ အသက်)
        let startAge;
        switch(day) {
            case "sun": startAge = 1; break;
            case "mon": startAge = 2; break;
            case "tue": startAge = 3; break;
            case "wed": startAge = 4; break;
            case "thu": startAge = 5; break;
            case "fri": startAge = 6; break;
            case "sat": startAge = 7; break;
        }

        // တွက်ချက်ပုံ Logic:
        // အသက်သည် စမှတ်ထက်ကြီးရမည်။ ခြားနားချက်ကိုယူပြီး ၇ ကွက်ထဲမှာ ဘယ်နေရာရောက်လဲရှာမည်။
        // ဥပမာ- တနင်္လာ (Start: 2), အသက် ၂၀ ဆိုရင် (20-2) = 18.
        // 18 ကို 7 နဲ့စားရင် အကြွင်း 4 ရသည်။ 
        // သို့သော် ဇယားက ၂ ကွက်စီ ခုန်နေသဖြင့် (18/2) % 7 = 9 % 7 = 2 (ပျက်) အတိအကျရပါသည်။
        
        let diff = age - startAge;
        if (diff < 0) {
            alert("ဤအသက်အတွက် ဇယားမရှိပါ။");
            return;
        }

        let index = (diff / 2) % 7;
        
        // အကယ်၍ အသက်က ၁၉ လိုမျိုး မကိန်းဖြစ်နေရင် (တနင်္လာမှာ အသက် ၂၀ က ပျက် ဆိုရင် ၁၉ က ထွက် ဖြစ်ရပါမယ်)
        // ထို့ကြောင့် Math.floor သုံးပြီး အနီးစပ်ဆုံး အကွက်ကို ယူပါမယ်။
        let finalIndex = Math.round(index); 
        
        // Array range ထဲ ပြန်ထည့်ခြင်း
        finalIndex = finalIndex % 7;

        let resultStatus = sequence[finalIndex];
        document.getElementById('statusName').innerText = resultStatus;
        document.getElementById('fortuneText').innerText = fortunes[resultStatus];
        document.getElementById('result').style.display = 'block';
    }
</script>

</body>
</html>
