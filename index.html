<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>မြန်မာ့ရိုးရာ ဟောစတမ်း</title>
    <style>
        :root { --primary-color: #d4af37; --bg-color: #f4f1ea; }
        body { font-family: 'Pyidaungsu', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; border-top: 6px solid var(--primary-color); }
        
        /* နေ့ရွေးရန် */
        .day-select { margin-bottom: 20px; }
        select { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; font-size: 16px; margin-bottom: 10px; }
        
        /* ဇယားပုံပြသမည့်နေရာ */
        #chartImage { width: 100%; border-radius: 10px; margin-bottom: 20px; border: 1px solid #eee; display: none; }
        .placeholder-text { color: #888; margin-bottom: 20px; font-style: italic; }

        /* ဟောကိန်းခလုတ်များ */
        .button-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .btn-fortune { padding: 10px 5px; background: #5a4a1a; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 14px; transition: 0.3s; }
        .btn-fortune:hover { background: var(--primary-color); }

        /* ဟောစာတမ်းပြသရန် */
        #result { padding: 15px; border-radius: 10px; background: #fffdf5; border: 1px solid #d4af37; display: none; text-align: justify; animation: fadeIn 0.5s; }
        .status-title { font-weight: bold; color: #d32f2f; font-size: 20px; text-align: center; display: block; margin-bottom: 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <h2>ဗေဒင်ဟောစတမ်း</h2>
    
    <div class="day-select">
        <label style="display:block; text-align:left; font-weight:bold; margin-bottom:5px;">မွေးနေ့ ရွေးချယ်ပါ</label>
        <select id="dayPicker" onchange="updateImage()">
            <option value="">-- ရွေးချယ်ရန် --</option>
            <option value="sun">တနင်္ဂနွေ</option>
            <option value="mon">တနင်္လာ</option>
            <option value="tue">အင်္ဂါ</option>
            <option value="wed">ဗုဒ္ဓဟူး</option>
            <option value="thu">ကြာသပတေး</option>
            <option value="fri">သောကြာ</option>
            <option value="sat">စနေ</option>
        </select>
    </div>

    <div id="imageContainer">
        <img id="chartImage" src="" alt="ဇယားပုံ">
        <p id="placeholder" class="placeholder-text">မွေးနေ့ရွေးလိုက်လျှင် ဇယားပုံပေါ်လာပါမည်</p>
    </div>

    <p style="font-weight:bold; color:#5a4a1a;">မိမိရောက်နေသော အကွက်ကိုနှိပ်ပါ</p>
    <div class="button-grid">
        <button class="btn-fortune" onclick="showFortune('တည်')">တည်</button>
        <button class="btn-fortune" onclick="showFortune('ထွက်')">ထွက်</button>
        <button class="btn-fortune" onclick="showFortune('ပျက်')">ပျက်</button>
        <button class="btn-fortune" onclick="showFortune('ကျောက်')">ကျောက်</button>
        <button class="btn-fortune" onclick="showFortune('ထီး')">ထီး</button>
        <button class="btn-fortune" onclick="showFortune('နန်း')">နန်း</button>
        <button class="btn-fortune" onclick="showFortune('စံ')">စံ</button>
    </div>

    <div id="result">
        <span id="resTitle" class="status-title"></span>
        <div id="resBody"></div>
    </div>
</div>

<script>
    const fortunes = {
        "တည်": "တည်ဆိုတာသင်္ဘောတည်ဆောက်တာကိုပြောတာပါ။ လုပ်ငန်းတွေအတွက်ကြံစည်ဆဲ၊ လုပ်ငန်းတွေအစပြုဆဲအခြေအနေကိုရောက်နေတယ်လို့ ပြောတာပါ။ လုပ်ငန်းအတွက်ရင်းနှီးမြုပ်နှံဖို့ ရန်ရှာရာတွင်လွယ်ကူလိမ့်မည်။ လုပ်ငန်းအကြံအစည်အောင်မြင်မည်။ အလုပ်ရှာနေလျှင် အလုပ်ရမည်။ အလုပ်လျှောက်ထားလျှင်အလုပ်ရမည်။ အမှုကိစ္စတွေ၊ အလုပ်တွေများမည်။ ငွေဝင်များသလို ငွေထွက်လဲများမည်။",
        "ထွက်": "ထွက်ဆိုတာဇမ္ဗနဂိုရ်ပြည်ကသင်္ဘောစထွက်တာကိုပြောတာပါ။ ကောင်းမွန်သောမိတ်ဆွေသစ်များ တိုးမည်။ စပ်တူရှယ်ယာလုပ်ငန်းများလုပ်ရမည့်အချိန်ကောင်းပါ။ပြည်တွင်း၊ပြည်ပခရီးများသွားရမည်။ နိုင်ငံခြားကုန်လုပ်ငန်းများ အောင်မြင်မည်။",
        "ပျက်": "ပျက်ဆိုတာ သင်္ဘောပျက်သွားတာကိုပြောတာပါ။ ကံဇာတာညံ့ချိန်ပါ။ စီးပွားရေးကျဆင်းမယ်။ သူများမကောင်းကြံတာခံရတတ်သည်။ မတော်တဆထိခိုက်မှုအသေးအဖွဲများကြုံတတ်သလို သေကောင်ပေါင်းလဲဝေဒနာများ ဖြစ်တတ်သည်။ ရာထူးလုပ်ငန်းကိုနှောင့်ယှက်မည့်သူ ပေါ်လာလိမ့်မည်။ အိမ်ထောင်ရေးကို အထူးသတိထားပါ။",
        "ကျောက်": "ကျောက်ဆိုတာမေခလာနတ်သမီးက ကျောက်ဖျာထက်မှာတင်ပေးထားတဲ့ ကိန်းဆိုက်ပြီဆိုတော့ ကံကောင်းပြီလို့မှတ်ပါ။ မမျှော်လင့်ပဲကူညီမယ့်သူတွေပေါ်မယ်။ အောင်ပါလေသိန်းထီဆုကြီးများ ပေါက်မည်။ မကျန်းမမာဖြစ်နေရင်တော့ ပြန်ပြီးကျန်းမာလာမည်။ ဆရာကောင်းနဲ့တွေ့ပြီလို့ဟောပါ။ အမှုရှိရင်ရှိနိုင်မည်။ အချုပ်နှောင်ခံနေရရင်လွတ်မည်။ ကျဆင်းနေသောစီးပွားရေးများ ပြန်တက်လာမည်။ ပညာရေးလဲကောင်းမည်။ အိမ်ထောင်ကျလျှင် အိမ်ထောင်ဖက်ကောင်းနှင့်တွေ့ပြီလို့ဟောပါ။ အကြံအစည်များ အောင်မြင်မည်။",
        "ထီး": "ထီးဆိုတာ ထီးဖြူဆောင်းတဲ့ကိန်းပါ။ နာမည်ကျော်ကြားထင်ရှားမည်။ ကောင်းသတင်းနှင့် ကျော်ကြားခြင်းပါ။ ဆုလာဘ်တွေရမည်။ ဘွဲ့ထူးဂုဏ်ထူးများရမည်။ စာမေးပွဲဖြေထားရင် စာမေးပွဲအောင်မည်။ ရာထူးတိုးမည်။ စီးပွားရေးလုပ်ငန်းများ တိုးချဲ့ရမည်။ အိမ်သစ်ဆောက်ကိန်း၊ အိမ်သစ်ရကိန်းပေါ်မည်။",
        "နန်း": "နန်းဆိုတာ နန်းအပ်ခံရတဲ့ကိန်းပါ။ ကံဇာတာကောင်းပြီလို့ဟောပါ။ ရာထူးတိုးမည်။ စီးပွားဖြစ်ထွန်းမည်။ အမွေအနှစ်တွေရမည်။ အပြိုင်အဆိုင်တွေမှာ အနိုင်ရမည်။ ရွေးကောက်ပွဲတွေမှာဝင်ရောက်ယှဉ်ပြိုင်ရင်နိုင်မည်။ အိမ်ထောင်ကျကိန်းရှိသည်။ အိမ်ထောင်ကျလျှင်လဲ ကံကောင်းမည်။ အလှူပြုလုပ်ရမည်။ မင်းစိုးရာဇာအကြီးအကဲဖြစ်မည်။",
        "စံ": "စံဆိုတာ မင်းစည်းစိမ်ကိုခံယူရတဲ့ကိန်းပါ။ ဘေးအန္တာရာယ်ကင်းပြီး စုတ်ကြီး၊လာဘ်ကြီးတွေဝင်မည်။ လုပ်ငန်းတွေတိုးတက်မည်။ ကြီးမားတဲ့ရာထူးတွေရမည်။ သိုလှောင်ပစ္စည်းတွေကအကျိုးအမြတ်ရမည်။ အခြွေအရံမိတ်ဆွေအပေါင်း အသင်းတိုးမည်။ ငွေကြေးစုဆောင်းမိမည်။"
    };

    function updateImage() {
        const day = document.getElementById('dayPicker').value;
        const img = document.getElementById('chartImage');
        const placeholder = document.getElementById('placeholder');

        if (day) {
            // ပုံရှိရမည့်လမ်းကြောင်း (ဥပမာ sun.jpg, mon.jpg)
            img.src = day + ".jpg"; 
            img.style.display = "block";
            placeholder.style.display = "none";
        } else {
            img.style.display = "none";
            placeholder.style.display = "block";
        }
    }

    function showFortune(type) {
        const resultDiv = document.getElementById('result');
        const resTitle = document.getElementById('resTitle');
        const resBody = document.getElementById('resBody');

        resTitle.innerText = "** " + type + " **";
        resBody.innerText = fortunes[type];
        resultDiv.style.display = "block";
        
        // ခလုတ်နှိပ်ပြီးရင် ရလဒ်ဆီသို့ auto scroll ဆွဲပေးခြင်း
        resultDiv.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
