<!DOCTYPE html>
<html lang="my">
<head>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#d4af37">

    <script>
        if ('service worker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('sw.js')
                    .then(reg => console.log('Service Worker Registered'))
                    .catch(err => console.log('Service Worker Failed', err));
            });
        }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>မြန်မာ့ရိုးရာ ဟောစာတမ်း</title>
    <style>
        :root { --primary-color: #d4af37; --bg-color: #f4f1ea; --dark-brown: #5a4a1a; --soft-gold: #fffdf2; }
        body { font-family: 'Pyidaungsu', 'UniBurma', sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; padding: 20px; margin: 0; }
        .container { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 500px; width: 100%; text-align: center; border-top: 8px solid var(--primary-color); position: relative; }
        
        /* Language Switcher */
        .lang-switcher { position: absolute; top: 15px; right: 15px; display: flex; gap: 8px; }
        .lang-btn { cursor: pointer; border: 1px solid #ddd; border-radius: 8px; background: white; padding: 6px 10px; display: flex; align-items: center; gap: 6px; font-size: 13px; font-weight: bold; transition: 0.3s; }
        .lang-btn:hover { background: #fdfaf0; border-color: var(--primary-color); }
        .flag-icon { width: 22px; height: 15px; object-fit: cover; border-radius: 2px; border: 1px solid #eee; }

        h2 { color: var(--dark-brown); margin: 45px 0 20px 0; font-size: 22px; border-bottom: 2px solid var(--primary-color); display: inline-block; padding-bottom: 5px; }
        
        /* Age Calculator Style */
        .calc-box { background: #f9f6f0; border: 1px solid #e0d5b1; padding: 15px; border-radius: 12px; margin-bottom: 25px; text-align: left; }
        .calc-box label { font-weight: bold; font-size: 14px; color: var(--dark-brown); display: block; margin-bottom: 8px; }
        .input-group { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 15px; outline: none; }
        .btn-calc { background: var(--dark-brown); color: white; border: none; padding: 0 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-calc:hover { background: var(--primary-color); }
        #ageDisplay { margin-top: 10px; font-weight: bold; color: #d32f2f; font-size: 14px; }

        select { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #eee; font-size: 16px; margin-bottom: 20px; outline: none; }
        
        #chartImage { width: 100%; border-radius: 12px; margin-bottom: 20px; border: 1px solid #ddd; display: none; }
        .placeholder-text { color: #999; margin-bottom: 25px; font-style: italic; font-size: 14px; background: #fafafa; padding: 30px 10px; border-radius: 12px; border: 1px dashed #ccc; }

        .button-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 25px; }
        .btn-fortune { padding: 12px 5px; background: var(--dark-brown); color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; transition: 0.3s; font-weight: bold; }
        .btn-fortune:hover { background: var(--primary-color); }

        /* Blogger-style Result Post */
        #result { padding: 25px; border-radius: 12px; background: var(--soft-gold); border: 1px solid #eedda2; display: none; text-align: justify; margin-bottom: 30px; animation: slideUp 0.5s ease-out; line-height: 1.8; box-shadow: inset 0 0 10px rgba(212,175,55,0.1); text-align: center; }
        .status-title { font-weight: bold; color: #d32f2f; font-size: 24px; text-align: center; display: block; margin-bottom: 15px; border-bottom: 2px double #eedda2; padding-bottom: 10px; }
        
        /* ဟောစာတမ်းပုံအတွက် style */
        .fortune-post-image { max-width: 100%; height: auto; border-radius: 8px; border: 2px solid var(--primary-color); box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        
        .post-footer { margin-top: 20px; font-style: italic; color: #777; font-size: 13px; text-align: right; border-top: 1px solid #eee; padding-top: 10px; }

        .footer-nav { border-top: 1px solid #eee; padding-top: 20px; display: flex; gap: 10px; justify-content: center; }
        .btn-link { padding: 10px 20px; border-radius: 30px; border: 2px solid var(--primary-color); background: white; color: var(--dark-brown); cursor: pointer; text-decoration: none; font-size: 14px; font-weight: bold; transition: 0.3s; }
        .btn-link:hover { background: var(--primary-color); color: white; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); backdrop-filter: blur(2px); }
        .modal-content { background: white; margin: 20% auto; padding: 30px; border-radius: 20px; width: 85%; max-width: 400px; text-align: center; border-bottom: 6px solid var(--primary-color); position: relative; }
        .close { position: absolute; right: 15px; top: 10px; font-size: 28px; cursor: pointer; color: #aaa; }
        
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="container">
    <div class="lang-switcher">
        <div class="lang-btn" onclick="changeLang('my')"><img src="mm-flag.png" class="flag-icon"> MY</div>
        <div class="lang-btn" onclick="changeLang('pa')"><img src="pao-flag.png" class="flag-icon"> PA</div>
    </div>
    <h2 id="mainTitle">မြန်မာ့ရိုးရာ ဟောစာတမ်း</h2>

    <div class="calc-box">
        <label id="calcLabel">မွေးသက္ကရာဇ်ဖြင့် အသက်တွက်ရန်</label>
        <div class="input-group">
            <input type="number" id="birthYear" placeholder="ဥပမာ - 1995 (သို့) ၁၃၅၇">
            <button class="btn-calc" onclick="calculateAge()" id="btnCalcText">တွက်မည်</button>
        </div>
        <div id="ageDisplay"></div>
    </div>
    
    <div class="day-select">
        <select id="dayPicker" onchange="updateImage()">
            <option value="" id="optDefault">-- မွေးနေ့ ရွေးချယ်ပါ --</option>
            <option value="sun" id="optSun">တနင်္ဂနွေ</option>
            <option value="mon" id="optMon">တနင်္လာ</option>
            <option value="tue" id="optTue">အင်္ဂါ</option>
            <option value="wed" id="optWed">ဗုဒ္ဓဟူး</option>
            <option value="thu" id="optThu">ကြာသပတေး</option>
            <option value="fri" id="optFri">သောကြာ</option>
            <option value="sat" id="optSat">စနေ</option>
        </select>
    </div>

    <div id="imageContainer">
        <img id="chartImage" src="" alt="Chart">
        <p id="placeholder" class="placeholder-text">မွေးနေ့ရွေးလိုက်လျှင် ဇယားပုံပေါ်လာပါမည်</p>
    </div>

    <p style="font-weight:bold; color:var(--dark-brown); margin-bottom:10px;" id="instruction">မိမိအသက်ရောက်နေသော အကွက်ကိုနှိပ်ပါ</p>
    <div class="button-grid">
        <button class="btn-fortune" onclick="showFortune('ti')">တည် </button>
        <button class="btn-fortune" onclick="showFortune('htwet')">ထွက် </button>
        <button class="btn-fortune" onclick="showFortune('pyet')">ပျက် </button>
        <button class="btn-fortune" onclick="showFortune('kyauk')">ကျောက် </button>
        <button class="btn-fortune" onclick="showFortune('htee')">ထီး </button>
        <button class="btn-fortune" onclick="showFortune('nan')">နန်း </button>
        <button class="btn-fortune" onclick="showFortune('san')">စံ </button>
    </div>

    <div id="result">
        <span id="resTitle" class="status-title"></span>
        <img id="resImage" class="fortune-post-image" src="" alt="ဟောစာတမ်းရလဒ်">
        <div class="post-footer" id="postFooter">ကံကြမ္မာသည် သင်၏ ကြိုးစားအားထုတ်မှုပေါ်တွင်လည်း မူတည်ပါသည်။</div>
    </div>

    <div class="footer-nav">
        <button class="btn-link" onclick="toggleAbout()" id="btnAbout">About Us</button>
        <a href="https://khunsoeyee.blogspot.com" target="_blank" class="btn-link" id="btnBlog">BLOG</a>
    </div>
</div>

<div id="aboutModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="toggleAbout()">&times;</span>
        <p id="aboutText" style="text-align: justify; line-height: 1.8;"></p>
        <p style="font-weight: bold; margin-top: 15px; color: var(--dark-brown);" id="aboutAuthor">By ခွန်စိုးရီ - ချို့ꩻထီ</p>
    </div>
</div>

<script>
    let currentLang = 'my'; // လက်ရှိ ဘာသာစကားကို မှတ်သားရန်

    const translations = {
        my: {
            title: "မြန်မာ့ရိုးရာ ဟောစာတမ်း",
            placeholder: "မွေးနေ့ရွေးလိုက်လျှင် ဇယားပုံပေါ်လာပါမည်",
            instruction: "မိမိအသက်ရောက်နေသော အကွက်ကိုနှိပ်ပါ",
            optDefault: "-- မွေးနေ့ ရွေးချယ်ပါ --",
            days: ["တနင်္ဂနွေ", "တနင်္လာ", "အင်္ဂါ", "ဗုဒ္ဓဟူး", "ကြာသပတေး", "သောကြာ", "စနေ"],
            about: "မင်္ဂလာပါ ကျနော်ကနည်းပညာမကျွမ်းကျင်သေးသူမို့ စာစီတာတွေမညီတာရှိရင် တောင်းပန်ပါတယ်ဗျ။ အားလုံးဘဲ ရွှင်လန်းချမ်းမြေ့ကြပါစေ။",
            author: "By ခွန်စိုးရီ - ချို့ꩻထီ",
            calcLabel: "မွေးသက္ကရာဇ်ဖြင့် အသက်တွက်ရန်",
            calcBtn: "တွက်မည်",
            calcPlace: "ဥပမာ - 1995 (သို့) ၁၃၅၇",
            footer: "ကံကြမ္မာသည် သင်၏ ကြိုးစားအားထုတ်မှုပေါ်တွင်လည်း မူတည်ပါသည်။",
            titleTi: "တည် အကွက်",
            titleHtwet: "ထွက် အကွက်",
            titlePyet: "ပျက် အကွက်",
            titleKyauk: "ကျောက် အကွက်",
            titleHtee: "ထီး အကွက်",
            titleNan: "နန်း အကွက်",
            titleSan: "စံ အကွက်"
        },
        pa: {
            title: "ဇနကဟော်ꩻကိန်ꩻ (ပအိုဝ်ႏ)",
            placeholder: "မိဉ်ႏလွိုက်မွူးနီꩻနဝ်ꩻ ဇယားပုံႏအီႏပေါႏလွဉ်သွူ",
            instruction: "သက်ကတွိုႏဒါႏ အကွက်ကိုယိုနျꩻသွော့",
            optDefault: "-- လွိုက်မွူးနီꩻ --",
            days: ["တနင်္ဂနွေႏ", "တနင်္လာႏ", "အင်္ဂါႏ", "ဗုဒ္ဓဟူး", "ကျာႏသပတေး", "သောကြာႏ", "စနေႏ"],
            about: "မင်္ဂလာႏဒျာႏဩ၊ နီသွဉ်းယိုနဝ်ꩻ နယ်ꩻပညာႏဖဲ့ꩻ တဒါႏလဲပ်ငါႏတဝ်းဒွုန်းတဲင် လိတ်ဖြုံႏမိဉ်ႏတမဲဉ်ႏတဝ်းလဲ့ ခွင်ꩻလွစ်ဖေႏသွော့ဩ။ ကားကအဝ်ႏ သꩻရျူႏနမ်းသာႏ အဝ်ႏအုံဟဝ်ခြွိုင်ႏသန်ꩻလွဒျာႏသွော့ဩ။",
            author: "By ခွန်စိုးရီ - ချို့ꩻထီ",
            calcLabel: "တွက်အသက်တာႏ",
            calcBtn: "တွက်သွော့",
            calcPlace: "ဥပမာ - 1995 မွေးတဝ်းတဲ့ ၁၃၅၇",
            footer: "ကံႏဇာႏတာႏယိုနဝ်ꩻအဝ်ႏဒင်ႏဒျာႏ နီဗွေႏသီးထာꩻကျိုꩻစာꩻမုꩻအလောင်းသွူဩ။",
            titleTi: "တည် အကွက်",
            titleHtwet: "ထွက် အကွက်",
            titlePyet: "ပျက် အကွက်",
            titleKyauk: "ကျောက် အကွက်",
            titleHtee: "ထီး အကွက်",
            titleNan: "နန်း အကွက်",
            titleSan: "စံ အကွက်"
        }
    };

    function calculateAge() {
        const year = parseInt(document.getElementById('birthYear').value);
        if (!year) return;
        const currentYear = new Date().getFullYear();
        let age = 0;
        let type = "";
        
        if (year > 1700) {
            age = currentYear - year;
            type = currentLang === 'my' ? "အင်္ဂလိပ်သက္ကရာဇ်" : "အင်္ဂလိပ်သက္ကရာဇ်";
        } else {
            const mmYear = currentYear - 638;
            age = mmYear - year;
            type = currentLang === 'my' ? "မြန်မာသက္ကရာဇ်" : "မြန်မာသက္ကရာဇ်";
        }
        
        const msg = currentLang === 'my' ? 
            `သင်၏အသက်မှာ (${age}) နှစ်ဖြစ်ပါသည်။ [${type}ဖြင့်တွက်ချက်ထားသည်]` : 
            `နီဗွေႏအသက်ယိုနဝ်ꩻ (${age}) နေင်ႏသွူဩ။ [တွက်တောမ်ႏ ${type} သွူ]`;
        document.getElementById('ageDisplay').innerText = msg;
    }

    function changeLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('mainTitle').innerText = t.title;
        document.getElementById('placeholder').innerText = t.placeholder;
        document.getElementById('instruction').innerText = t.instruction;
        document.getElementById('optDefault').innerText = t.optDefault;
        document.getElementById('calcLabel').innerText = t.calcLabel;
        document.getElementById('btnCalcText').innerText = t.calcBtn;
        document.getElementById('birthYear').placeholder = t.calcPlace;
        document.getElementById('postFooter').innerText = t.footer;
        
        const dayIds = ["optSun", "optMon", "optTue", "optWed", "optThu", "optFri", "optSat"];
        dayIds.forEach((id, i) => document.getElementById(id).innerText = t.days[i]);
        document.getElementById('aboutText').innerText = t.about;
        document.getElementById('aboutAuthor').innerText = t.author;
        
        // ဘာသာစကားပြောင်းလျှင် ရလဒ်ဟောင်းကို ဝှက်ထားရန်
        document.getElementById('result').style.display = "none";
        document.getElementById('ageDisplay').innerText = "";
    }

    function updateImage() {
        const day = document.getElementById('dayPicker').value;
        const img = document.getElementById('chartImage');
        const placeholder = document.getElementById('placeholder');
        if (day) {
            img.src = day + ".jpg"; 
            img.style.display = "block";
            placeholder.style.display = "none";
        } else {
            img.style.display = "none";
            placeholder.style.display = "block";
        }
    }

    // စာသားအစား ပုံကို ပြသရန် ပြင်ဆင်ထားသော function
    function showFortune(type) {
        const birthday = document.getElementById('dayPicker').value; // နေ့ရွေးထားခြင်း ရှိမရှိ စစ်ရန်
        if (!birthday) {
            alert(currentLang === 'my' ? "မွေးနေ့ (နေ့စဉ်ဇယား) အရင်ရွေးချယ်ပေးပါ" : "လွိုက်ရွေꩻရီးသွော့မွူးနီꩻဖွာꩻ");
            return;
        }

        const resultContainer = document.getElementById('result');
        const resultTitle = document.getElementById('resTitle');
        const resultImage = document.getElementById('resImage');
        const t = translations[currentLang];

        // ခေါင်းစဉ်တပ်ခြင်း
        let titleText = "";
        switch(type) {
            case 'ti': titleText = t.titleTi; break;
            case 'htwet': titleText = t.titleHtwet; break;
            case 'pyet': titleText = t.titlePyet; break;
            case 'kyauk': titleText = t.titleKyauk; break;
            case 'htee': titleText = t.titleHtee; break;
            case 'nan': titleText = t.titleNan; break;
            case 'san': titleText = t.titleSan; break;
        }
        resultTitle.innerText = "~~~ " + titleText + " ~~~";

        // ပုံအမည်ကို logic ဖြင့် တည်ဆောက်ခြင်း (ဥပမာ- images/fortunes/my_ti.png)
        // ပုံရှိသည့် folder လမ်းကြောင်းကို images/fortunes/ ဟု သတ်မှတ်ထားသည်
        const imagePath = `images/fortunes/${currentLang}_${type}.png`;
        resultImage.src = imagePath;

        // ရလဒ်ကို ဖော်ပြခြင်း
        resultContainer.style.display = "block";
        resultContainer.scrollIntoView({ behavior: 'smooth' });
    }

    function toggleAbout() {
        const modal = document.getElementById('aboutModal');
        modal.style.display = (modal.style.display === "block") ? "none" : "block";
    }

    // Init with default MY
    window.onload = () => changeLang('my');
    window.onclick = (e) => { if (e.target.className === 'modal') toggleAbout(); }
</script>

</body>
</html>
